name: Question
description: Ask a usage or installation question.
title: "[Question]: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true
  - type: input
    id: model_mind_version
    attributes:
      label: ModelMind version
  - type: input
    id: laravel_version
    attributes:
      label: Laravel version
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Remove secrets and private data.
      render: php
