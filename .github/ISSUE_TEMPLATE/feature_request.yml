name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should ModelMind do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat UI
        - Model context
        - Security
        - Learning memory
        - Provider integration
        - Documentation
        - Testing
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
