name: Documentation
description: Report missing, unclear, or incorrect documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link to the section or name the file.
      placeholder: docs/USAGE.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording
